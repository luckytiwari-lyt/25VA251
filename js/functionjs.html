      //callback function:- callback function is a function that is passed as an argument to another function and is executed later, usually after some operation is completed.

       function mul(callback){
        var num1=10;
        console.log("first vale is " + num1);
        var num2=20;
        console.log("second vale is " +num2);
        var res=num1*num2;

       //map filter and reduce In JavaScript, the map() function is an Array method that creates a new array by applying a callback function to each element of the original array.
        //It does not modify the original array

       let num =[1,4,6,2,5,7];
       let finalResult=num.map(n=>n*2);
        console.log(finalResult);

        //filter 
        let finalResult1=num.filter((total,n) =>total+n);
        console.log(finalResult1);


        //reduce
